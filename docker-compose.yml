services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - LLM_PROVIDER=${LLM_PROVIDER:-groq}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - GROQ_JUDGE_MODEL=${GROQ_JUDGE_MODEL:-llama-3.3-70b-versatile}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_JUDGE_MODEL=${OPENAI_JUDGE_MODEL:-gpt-4o}
      - EMBEDDINGS_PROVIDER=${EMBEDDINGS_PROVIDER:-local}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - CORS_ORIGINS=http://localhost:3000
      - AGENT_VERSION=${AGENT_VERSION:-v2}
      - CONFIDENCE_THRESHOLD=${CONFIDENCE_THRESHOLD:-0.55}
    volumes:
      - chroma-data:/app/data/chroma
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  redis-data:
  chroma-data:
